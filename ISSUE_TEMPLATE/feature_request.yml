name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: input
    id: summary
    attributes:
      label: Summary
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
